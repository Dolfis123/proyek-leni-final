server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # LOGIKA PENTING REACT ROUTER:
        # Jika file tidak ketemu, kembalikan ke index.html
        # (Supaya halaman tidak error 404 saat direfresh)
        try_files $uri /index.html;
    }
        error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
}       